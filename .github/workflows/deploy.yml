name: Deploy to remote host

on:
  workflow_dispatch:
    inputs:
      ssh_host:
        description: "SSH host (user@host or host)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DF_VERSION: "53_14"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$(echo '${{ inputs.ssh_host }}' | cut -d@ -f2)" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pull image and restart container on remote
        env:
          SSH_HOST: ${{ inputs.ssh_host }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}:df-${DF_VERSION}"

          $SSH_CMD "$SSH_HOST" bash -s <<SCRIPT
            set -euo pipefail
            echo "==> Logging in to GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pulling ${IMAGE}"
            docker pull "${IMAGE}"

            echo "==> (Re)starting container"
            NAME="df"
            SAVES_DIR="\$HOME/remote-df/saves"
            mkdir -p "\$SAVES_DIR"
            docker rm -f "\$NAME" 2>/dev/null || true
            docker run -d --name "\$NAME" \
              --restart unless-stopped \
              -p "127.0.0.1:6080:6080" \
              -p "127.0.0.1:5900:5900" \
              -v "\$SAVES_DIR:/root/.local/share/Bay 12 Games/Dwarf Fortress/save" \
              "${IMAGE}"

            echo "==> Container '\$NAME' is up (loopback only). Saves: \$SAVES_DIR"
          SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
