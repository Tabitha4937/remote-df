name: Build and publish steam edition

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DF_VERSION: "53_14"
  DFHACK_VERSION: "53.14-r2"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=df-${{ env.DF_VERSION }}-steam
            type=raw,value=steam

      - name: Write Steam credentials
        run: |
          echo "${{ secrets.STEAM_USER }}" > /tmp/steam_user
          echo "${{ secrets.STEAM_PASS }}" > /tmp/steam_pass
          echo "${{ secrets.STEAM_GUARD }}" > /tmp/steam_guard

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DF_EDITION=steam
            DF_VERSION=${{ env.DF_VERSION }}
          secrets: |
            steam_user=/tmp/steam_user
            steam_pass=/tmp/steam_pass
            steam_guard=/tmp/steam_guard

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/steam_user /tmp/steam_pass /tmp/steam_guard
