<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dwarf Fortress</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #vnc-frame {
        display: block;
        width: 100%;
        height: calc(100% - 36px);
        border: none;
      }

      #audio-bar {
        height: 36px;
        background: #111;
        border-top: 1px solid #333;
        display: flex;
        align-items: center;
        padding: 0 10px;
        gap: 8px;
      }

      #audio-bar span {
        color: #666;
        font: 11px/1 monospace;
        white-space: nowrap;
        user-select: none;
      }

      #audio-player {
        flex: 1;
        height: 26px;
        accent-color: #8b6914;
      }

      #play-btn {
        display: none;
        background: #8b6914;
        color: #fff;
        border: none;
        border-radius: 3px;
        padding: 3px 8px;
        font: 11px/1 monospace;
        cursor: pointer;
        white-space: nowrap;
      }
      #play-btn:hover {
        background: #a87820;
      }

      #links {
        display: flex;
        gap: 10px;
        white-space: nowrap;
      }
      #links a {
        color: #8b6914;
        font: 11px/1 monospace;
        text-decoration: none;
      }
      #links a:hover {
        color: #c89a3a;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <!-- noVNC connects WebSocket to /websockify (same origin, nginx proxies it) -->
    <iframe
      id="vnc-frame"
      src="vnc.html?autoconnect=1&resize=scale&path=websockify"
      allowfullscreen
    ></iframe>

    <div id="audio-bar">
      <span>&#x1F50A;</span>
      <audio id="audio-player" controls>
        <source src="/audio" type="audio/ogg; codecs=opus" />
      </audio>
      <button
        id="play-btn"
        title="Click to enable audio (required by browser autoplay policy)"
      >
        &#x25B6; Enable audio
      </button>
      <nav id="links">
        <a href="/backups/" target="_blank" title="Download periodic save backups">backups</a>
        <a href="/saves/" target="_blank" title="Browse the live save directory">saves</a>
        <a href="/logs/" target="_blank" title="View container logs">logs</a>
      </nav>
    </div>

    <script>
      const frame = document.getElementById("vnc-frame");
      const bar = document.getElementById("audio-bar");
      const player = document.getElementById("audio-player");
      const playBtn = document.getElementById("play-btn");

      // Try autoplay; show the manual play button only if the browser blocks it.
      player
        .play()
        .then(() => {
          playBtn.style.display = "none";
        })
        .catch(() => {
          playBtn.style.display = "inline-block";
        });

      playBtn.addEventListener("click", () => {
        player.play();
        playBtn.style.display = "none";
      });

      // Give the noVNC iframe keyboard focus after it loads and on click
      // (except when interacting with the audio bar).
      frame.addEventListener("load", () => {
        try {
          frame.contentWindow.focus();
        } catch (_) {}
      });
      document.addEventListener("click", (e) => {
        if (!bar.contains(e.target)) {
          try {
            frame.contentWindow.focus();
          } catch (_) {}
        }
      });
    </script>
  </body>
</html>
