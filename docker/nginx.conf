map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 6080;

    # Custom landing page — noVNC iframe + integrated audio player.
    location = / {
        root /opt/novnc-custom;
        try_files /index.html =404;
    }

    # WebSocket path: noVNC connects to /websockify, nginx proxies to
    # the internal websockify instance on port 6081.
    location /websockify {
        proxy_pass         http://127.0.0.1:6081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Audio stream: proxy to the Icecast mount (fans out to many listeners).
    location /audio {
        proxy_pass         http://127.0.0.1:8000/df.ogg;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
    }

    # Browse/download periodic save backups (tarballs written by start.sh).
    location /backups/ {
        alias     /backups/;
        autoindex on;
    }

    # Browse/download the live save dir (DF v50's XDG location). Read-only.
    location /saves/ {
        alias     "/root/.local/share/Bay 12 Games/Dwarf Fortress/save/";
        autoindex on;
    }

    # Browse container logs (df.log, xvnc.log, audio.log, icecast.log, …).
    location /logs/ {
        alias     /var/log/df/;
        autoindex on;
    }

    # noVNC static assets (vnc.html, core/*, app/*, etc.)
    location / {
        root /usr/share/novnc;
    }
}
