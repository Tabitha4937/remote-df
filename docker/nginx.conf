map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 6080;

    # Custom landing page — noVNC iframe + integrated audio player.
    location = / {
        root /opt/novnc-custom;
        try_files /index.html =404;
    }

    # WebSocket path: noVNC connects to /websockify, nginx proxies to
    # the internal websockify instance on port 6081.
    location /websockify {
        proxy_pass         http://127.0.0.1:6081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Audio stream: nginx reads from the Ogg/Opus FIFO written by ffmpeg.
    # Ogg has the widest browser support (Firefox, Chrome, Edge, Safari 15+).
    location /audio {
        types {}
        default_type audio/ogg;
        add_header Cache-Control no-cache;
        add_header X-Content-Type-Options nosniff;
        alias /tmp/audio.ogg;
        sendfile off;
    }

    # noVNC static assets (vnc.html, core/*, app/*, etc.)
    location / {
        root /usr/share/novnc;
    }
}
